name: Content Ingestion Pipeline

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  process-content:
    # Trigger on content:article or content:repo labels
    if: >
      github.event.label.name == 'content:article' ||
      github.event.label.name == 'content:repo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue metadata
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const label = context.payload.label.name;
            const isArticle = label === 'content:article';
            const contentType = isArticle ? 'article' : 'repo';
            const body = issue.body || '';
            
            // Extract URL
            const urlMatch = body.match(/### Article URL\s*\n\s*(\S+)/i) ||
                           body.match(/### Repository URL\s*\n\s*(\S+)/i) ||
                           body.match(/(https?:\/\/\S+)/);
            const url = urlMatch ? urlMatch[1].trim() : '';
            
            // Extract category
            const catMatch = body.match(/### Category\s*\n\s*(.+)/i);
            const category = catMatch ? catMatch[1].trim() : 'Other';
            
            // Extract context/notes
            const ctxMatch = body.match(/### Why is this useful\?\s*\n\s*([\s\S]*?)(?=###|$)/i);
            const notes = ctxMatch ? ctxMatch[1].trim() : '';
            
            // Extract use cases (for repos)
            const ucMatch = body.match(/### Use Cases\s*\n\s*([\s\S]*?)(?=###|$)/i);
            const useCases = ucMatch ? ucMatch[1].trim() : '';
            
            if (!url) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '⚠️ **Error:** Could not find a URL in this issue. Please edit to include a valid URL.'
              });
              core.setFailed('No URL found in issue');
              return;
            }
            
            core.setOutput('type', contentType);
            core.setOutput('url', url);
            core.setOutput('category', category);
            core.setOutput('notes', notes);
            core.setOutput('use_cases', useCases);
            core.setOutput('issue_number', issue.number);
            core.setOutput('issue_title', issue.title);

      - name: Comment - processing started
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.parse.outputs.issue_number }},
              body: [
                `### 🤖 Content Ingestion Pipeline`,
                ``,
                `**Type:** ${{ steps.parse.outputs.type }}`,
                `**URL:** ${{ steps.parse.outputs.url }}`,
                `**Category:** ${{ steps.parse.outputs.category }}`,
                ``,
                `**Status:** Processing — fetching content and generating summary...`,
                ``,
                `> This automation will create a PR when complete.`,
              ].join('\n')
            });

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 PyGithub openai anthropic

      - name: Run ingestion script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTENT_TYPE: ${{ steps.parse.outputs.type }}
          CONTENT_URL: ${{ steps.parse.outputs.url }}
          CATEGORY: ${{ steps.parse.outputs.category }}
          NOTES: ${{ steps.parse.outputs.notes }}
          USE_CASES: ${{ steps.parse.outputs.use_cases }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x .github/scripts/ingest-content.sh
          .github/scripts/ingest-content.sh

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            docs: add ${{ steps.parse.outputs.type }} - ${{ steps.parse.outputs.issue_title }}
            
            Automated ingestion from issue #${{ steps.parse.outputs.issue_number }}
            
            Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>
          branch: content/issue-${{ steps.parse.outputs.issue_number }}
          delete-branch: true
          title: |
            docs: add ${{ steps.parse.outputs.type }} - ${{ steps.parse.outputs.issue_title }}
          body: |
            ## Automated Content Ingestion
            
            **Source Issue:** #${{ steps.parse.outputs.issue_number }}
            **Type:** ${{ steps.parse.outputs.type }}
            **URL:** ${{ steps.parse.outputs.url }}
            **Category:** ${{ steps.parse.outputs.category }}
            
            ### Changes
            
            - Added content file to `${{ steps.parse.outputs.type }}s/` folder
            - Updated index with new entry
            
            ### Review Checklist
            
            - [ ] Summary is accurate and concise
            - [ ] Category assignment is appropriate
            - [ ] Links are valid and accessible
            - [ ] Formatting follows repo conventions
            
            ---
            
            *This PR was automatically generated by the content ingestion pipeline.*
            
            Closes #${{ steps.parse.outputs.issue_number }}
          labels: |
            automated-pr
            content-ingestion
            squad:hermes

      - name: Comment - PR created
        if: steps.create_pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.create_pr.outputs.pull-request-number }}';
            const prUrl = '${{ steps.create_pr.outputs.pull-request-url }}';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.parse.outputs.issue_number }},
              body: [
                `### ✅ Content Processing Complete`,
                ``,
                `**Pull Request:** #${prNumber}`,
                `**URL:** ${prUrl}`,
                ``,
                `The content has been processed and a PR is ready for review.`,
                `Hermes (Technical Writer) will review the PR.`,
                ``,
                `This issue will close automatically when the PR is merged.`,
              ].join('\n')
            });
            
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.parse.outputs.issue_number }},
              state: 'closed',
              state_reason: 'completed'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.parse.outputs.issue_number }},
              body: [
                `### ❌ Content Processing Failed`,
                ``,
                `The ingestion pipeline encountered an error.`,
                ``,
                `**Next Steps:**`,
                `1. Check the [workflow logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `2. Verify the URL is accessible`,
                `3. Re-trigger by removing and re-adding the label`,
                ``,
                `A squad member will investigate.`,
              ].join('\n')
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.parse.outputs.issue_number }},
              labels: ['help-wanted', 'automation-failure']
            });
